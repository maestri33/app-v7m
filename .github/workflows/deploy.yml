name: Deploy
# CD: dispara DEPOIS do CI passar na main (padrão das outras LXCs do projeto). O runner
# self-hosted do LXC atualiza /opt/app-promotor pro SHA que o CI validou, builda o standalone,
# copia os assets, reinicia o serviço e prova o health no loopback. Em FALHA: rollback de
# código + abre issue.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
concurrency:
  group: deploy-app-promotor
  cancel-in-progress: false
permissions:
  contents: read
  issues: write
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, app-promotor]
    steps:
      - name: SHA atual (rede de rollback)
        run: echo "PREV_SHA=$(git -C /opt/app-promotor rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Atualiza, builda e reinicia
        run: |
          exec > >(tee /tmp/app-promotor-deploy.log) 2>&1
          set -e
          cd /opt/app-promotor
          git fetch origin
          # o SHA EXATO que passou no CI (não 'origin/main' — evita deployar push posterior não-gated)
          git reset --hard ${{ github.event.workflow_run.head_sha }}
          npm ci
          npm run build
          # standalone não copia static/public sozinho:
          rm -rf .next/standalone/.next/static .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public || true
          sudo systemctl restart app-promotor
          # health no LOOPBACK (a URL pública de dentro do LXC pode ser bloqueada — egress)
          curl -fsS -o /dev/null --retry 5 --retry-delay 2 http://127.0.0.1:3001/
          echo "deploy OK @ ${{ github.event.workflow_run.head_sha }}"

      - name: Rollback de código em falha
        if: failure()
        run: |
          set -e
          cd /opt/app-promotor
          echo "ROLLBACK de código -> $PREV_SHA"
          git reset --hard "$PREV_SHA"
          npm ci
          npm run build
          rm -rf .next/standalone/.next/static .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public || true
          sudo systemctl restart app-promotor
          echo "rollback de CÓDIGO feito."

      - name: Abrir issue em falha (log sanitizado, via API)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 - <<'PY'
          import json, os, re, urllib.request
          try:
              log = open("/tmp/app-promotor-deploy.log").read()[-4000:]
          except OSError:
              log = "sem log capturado"
          log = re.sub(r"(?i)(KEY|TOKEN|SECRET|PASSWORD|PASSWD)([=:]\S+)", r"\1=[REDACTED]", log)
          sha = os.environ["GITHUB_SHA"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          body = f"Workflow: {os.environ['GITHUB_WORKFLOW']}\nSHA: {sha}\nRun: {run_url}\n\n```\n{log}\n```"
          payload = json.dumps({"title": f"deploy falhou @ {sha[:7]}", "body": body, "labels": ["deploy-failure"]}).encode()
          req = urllib.request.Request(
              f"{os.environ['GITHUB_API_URL']}/repos/{os.environ['GITHUB_REPOSITORY']}/issues",
              data=payload, method="POST",
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}", "Accept": "application/vnd.github+json"},
          )
          try:
              r = urllib.request.urlopen(req)
              print("issue criada:", json.loads(r.read()).get("html_url"))
          except Exception as e:  # noqa: BLE001
              print("WARN: criar issue falhou:", e)
          PY
