name: Loop de Melhoria (gerador de propostas)
# O LOOP AUTÔNOMO (Victor 2026-06-30): de tempos em tempos o Claude analisa o app, escolhe UMA
# melhoria pequena e concreta, e abre uma ISSUE de proposta — etiquetada `agent-candidate`.
#
# SEGURANÇA — o humano é o portão (não removível):
#  - este job abre issue com `agent-candidate`, NUNCA com `agent`. O `agent.yml` (que mexe no código
#    e roda com acesso a prod) só dispara se `github.actor == 'maestri33'`; um ator de schedule
#    (github-actions[bot]) abrindo `agent` seria BLOQUEADO de propósito. Então: o loop PROPÕE, o
#    Victor revisa e re-etiqueta pra `agent` → aí sim o devagent resolve. O loop nunca executa código.
#  - dedup: se já existe issue `agent-candidate` aberta, NÃO abre outra (não empilha ruído).
#  - o Claude aqui é READ-ONLY: só lê o repo e escreve o corpo da proposta; não commita, não builda.
on:
  schedule:
    - cron: "17 11 * * 1-5"   # ~08:17 BRT (UTC-3), dias úteis — 1 proposta/dia no máximo
  workflow_dispatch: {}        # o Victor pode disparar manualmente quando quiser
concurrency:
  group: improvement-loop
  cancel-in-progress: false
permissions:
  contents: read
  issues: write
jobs:
  propose:
    runs-on: [self-hosted, devagent]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pula se já há proposta aberta (dedup)
        id: guard
        env:
          GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
        run: |
          set -euo pipefail
          OPEN=$(gh issue list --label agent-candidate --state open --json number --jq 'length')
          echo "abertas=$OPEN"
          if [ "$OPEN" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Já existe proposta agent-candidate aberta — não vou empilhar."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude propõe UMA melhoria
        if: steps.guard.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: dummy
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          IS_SANDBOX: "1"
          GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
        run: |
          set -euo pipefail
          PROMPT="Voce e um engenheiro senior revisando este app (Next.js). Analise o codigo e proponha UMA UNICA melhoria pequena, concreta e de baixo risco — algo que um agente consiga resolver com mudanca minima. Priorize, nesta ordem: bug real, problema de acessibilidade, inconsistencia de UX, simplificacao de codigo duplicado. REGRAS DURAS: (1) NAO proponha mudanca em infra/CI (.github/, Dockerfile, deploy, next.config). (2) NAO proponha refactor grande nem nova feature. (3) A proposta tem que ser especifica: cite arquivo(s) e o que mudar e por que. (4) Se o app ja estiver bom e voce nao achar nada que valha a pena, responda APENAS a palavra NADA. Escreva a proposta em portugues, pronta pra virar uma issue: comece com um TITULO curto na primeira linha (sem prefixo), depois uma linha em branco, depois a descricao com contexto, arquivos e criterio de aceite."
          OUT=$(claude -p "$PROMPT" --dangerously-skip-permissions --max-turns 30)
          echo "$OUT" > /tmp/proposal.txt
          # primeira linha = titulo; resto = corpo.
          HEAD=$(head -n1 /tmp/proposal.txt | sed 's/^[#* ]*//')
          if [ -z "$HEAD" ] || printf '%s' "$HEAD" | grep -qiE '^NADA$'; then
            echo "Claude nao achou melhoria que valha a pena hoje. Nada a fazer."
            exit 0
          fi
          BODY=$(tail -n +2 /tmp/proposal.txt)
          FOOTER=$'\n\n---\n_Proposta automatica do loop de melhoria. Revise e, se concordar, troque a etiqueta de `agent-candidate` para `agent` para o devagent abrir o PR. Edite o texto antes se precisar._'
          gh issue create \
            --title "[proposta] ${HEAD:0:120}" \
            --label agent-candidate \
            --body "${BODY}${FOOTER}"
          echo "Proposta aberta como agent-candidate."
